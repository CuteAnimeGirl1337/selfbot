name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libfuse2

      - name: Install backend dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npx vite build

      - name: Build Linux (AppImage + deb)
        run: npx electron-builder --linux AppImage deb --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            dist/*.AppImage
            dist/*.deb

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install backend dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npx vite build

      - name: Build Windows (NSIS + Portable)
        run: npx electron-builder --win nsis portable --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: |
            dist/*.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux builds
        uses: actions/download-artifact@v4
        with:
          name: linux-builds
          path: dist/

      - name: Download Windows builds
        uses: actions/download-artifact@v4
        with:
          name: windows-builds
          path: dist/

      - name: List artifacts
        run: ls -lah dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: false
          body: |
            ## Selfbot Dashboard ${{ github.ref_name }}

            ### Downloads
            | Platform | File | Description |
            |----------|------|-------------|
            | Linux | `.AppImage` | Portable — download, chmod +x, run |
            | Linux | `.deb` | Debian/Ubuntu installer |
            | Windows | `-Setup.exe` | Windows installer |
            | Windows | `-Portable.exe` | Windows portable — no install needed |

            ### What's included
            - **322 bot commands** — economy, gambling, AI, moderation, stealth, cloner
            - **24-page React dashboard** with 6 themes
            - **Electron desktop app** with system tray
            - **Built-in Discord client**, command runner, analytics, and more

            ### Setup from source
            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd selfbot && npm install
            cd frontend && npm install && npx vite build && cd ..
            cp .env.example .env  # Add your Discord token
            node index.js
            ```

            ---
            *Built automatically by GitHub Actions*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
